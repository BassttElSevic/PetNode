# ──────────────────────────────────────────────────────────────
# nginx.conf —— nginx 反向代理配置（SSL 终结 + 转发到 Flask）
#
# 架构：
#   Engine ──HTTPS(:443)──→ nginx ──HTTP(:5000)──→ Flask(gunicorn)
#
# nginx 负责 SSL 终结（加解密），Flask 不需要改动，继续用 HTTP。
# 这样做的好处：Flask 代码零修改，SSL 管理集中在 nginx 一处。
#
# 证书：自签名证书（开发/测试用）
#   生产环境建议替换为 Let's Encrypt 证书
# ──────────────────────────────────────────────────────────────

# ─────────── HTTP → HTTPS 重定向（80 端口）───────────
server {
    listen 80;
    server_name _;

    # 将所有 HTTP 请求永久重定向到 HTTPS（301 Moved Permanently）
    return 301 https://$host$request_uri;
}

# ─────────── HTTPS 反向代理（443 端口）───────────
server {
    listen 443 ssl;
    server_name _;

    # ── SSL 证书配置 ──
    # 使用 generate_cert.sh 生成的自签名证书
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # ── SSL 协议和加密套件 ──
    # 只允许 TLS 1.2 和 TLS 1.3，禁用不安全的旧版本（TLS 1.0/1.1, SSLv3）
    ssl_protocols TLSv1.2 TLSv1.3;
    # 优先使用服务端指定的加密套件
    ssl_prefer_server_ciphers on;

    # ── 反向代理到 Flask ──
    location / {
        # 转发到 Flask 容器（docker-compose 中的服务名 flask-server，端口 5000）
        proxy_pass http://flask-server:5000;

        # 传递原始请求头，让 Flask 能看到真实客户端信息
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 透传所有自定义请求头（API Key、HMAC 签名等）
        proxy_pass_request_headers on;
    }
}
